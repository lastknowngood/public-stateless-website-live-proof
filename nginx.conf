server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    add_header X-Robots-Tag "noindex, nofollow, noarchive, noimageindex, nosnippet" always;

    location / {
        try_files $uri $uri/ =404;
    }
}
